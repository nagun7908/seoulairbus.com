<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Klook 바우처 검표 연습</title>
<style>
:root{--orange:#ff5b00;--orange-d:#e64f00;--ink:#161616;--muted:#777;--line:#e7e7e7;--bg:#eef0f3;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;line-height:1.6;}
.app{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.bar{position:sticky;top:0;z-index:30;background:var(--orange);color:#fff;padding:15px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.bar .lg{font-weight:800;font-size:18px;}
.bar .rt{margin-left:auto;display:flex;gap:8px;align-items:center;}
.chip{font-size:14px;background:rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;}
.exit{font-size:14px;background:#fff;color:var(--orange);font-weight:800;padding:7px 14px;border-radius:20px;border:0;cursor:pointer;}
.stage{flex:1;padding:16px 16px 34px;}
/* HOME */
.home h1{font-size:26px;margin-bottom:8px;}
.home .lead{font-size:17px;color:#333;margin-bottom:4px;}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 18px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.panel h2{font-size:19px;margin-bottom:14px;}
.flow{display:flex;flex-direction:column;gap:14px;}
.flow .f{display:flex;gap:13px;align-items:flex-start;font-size:17px;line-height:1.45;}
.flow .n{flex:0 0 30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.flow .f b{font-weight:800;}
.tip{background:#fff4ec;border:1px solid #ffcea3;border-radius:14px;padding:14px 16px;font-size:16px;color:#a4500f;margin-top:14px;font-weight:600;line-height:1.5;}
.pick{font-size:18px;font-weight:800;color:#333;margin:24px 4px 14px;}
.lcards{display:flex;flex-direction:column;gap:14px;}
.lcard{display:flex;align-items:center;gap:16px;background:#fff;border:2px solid var(--line);border-radius:18px;padding:20px 20px;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.lcard:active{transform:scale(.98);border-color:var(--orange);}
.lcard .fl{font-size:38px;}
.lcard b{font-size:22px;display:block;}
.lcard span{font-size:15px;color:var(--muted);}
.lcard .ar{margin-left:auto;color:var(--orange);font-size:28px;font-weight:800;}
.note{background:#fff7ed;border:1px solid #ffd9b3;border-radius:16px;padding:16px 18px;font-size:16px;margin-top:18px;color:#7a4a1f;}
.note .nt{font-weight:800;margin-bottom:8px;font-size:17px;}
.note ul{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;line-height:1.45;}
/* PROGRESS */
.prog{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:14px;}
.prog .p{font-size:14px;color:#aaa;display:flex;align-items:center;gap:5px;}
.prog .p b{width:25px;height:25px;border-radius:50%;background:#dfe2e7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.prog .p.on{color:var(--orange);font-weight:800;}
.prog .p.on b{background:var(--orange);}
.prog .p.done b{background:#22c55e;}
.prog .sep{width:14px;height:2px;background:#dfe2e7;border-radius:2px;}
/* PHONE */
.phone{position:relative;width:min(340px,92vw);margin:0 auto;border-radius:26px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.22);background:#fff;border:1px solid #ddd;aspect-ratio:340/736;}
.scr{position:absolute;inset:0;}
.scr img{width:100%;height:100%;display:block;object-fit:cover;}
.hot{position:absolute;cursor:pointer;border-radius:10px;}
.hot.ring{box-shadow:0 0 0 4px rgba(255,91,0,.95),0 0 0 9px rgba(255,91,0,.28);animation:pulse 1.3s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,91,0,.95),0 0 0 8px rgba(255,91,0,.25);}50%{box-shadow:0 0 0 4px rgba(255,91,0,.95),0 0 0 15px rgba(255,91,0,0);}}
.taghint{position:absolute;background:#161616;color:#fff;font-size:15px;font-weight:700;padding:8px 12px;border-radius:10px;white-space:nowrap;z-index:5;box-shadow:0 3px 8px rgba(0,0,0,.35);}
.taghint:after{content:"";position:absolute;left:16px;bottom:-6px;border:6px solid transparent;border-top-color:#161616;}
/* redeem */
.rdm{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;overflow:hidden;}
.rdm .top{display:flex;align-items:center;justify-content:center;position:relative;padding:14px 0;font-weight:700;font-size:18px;border-bottom:1px solid #f2f2f2;}
.rdm .top .bk{position:absolute;left:13px;font-size:20px;color:#333;}
.rdm .bd{padding:14px 16px;flex:1;overflow:auto;}
.rdm .ntc{display:flex;gap:7px;font-size:13px;color:#333;line-height:1.45;margin-bottom:10px;}
.rdm .ntc .i{flex:0 0 17px;height:17px;border:1.5px solid #333;border-radius:50%;text-align:center;font-size:11px;line-height:14px;font-style:italic;font-weight:700;}
.rdm .yel{background:#fdf0d9;border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.45;color:#4a3a1a;margin-bottom:14px;}
.rdm .hd{font-size:16px;font-weight:800;line-height:1.35;margin-bottom:12px;position:relative;padding-left:12px;}
.rdm .hd:before{content:"";position:absolute;left:0;top:2px;width:5px;height:19px;background:var(--orange);border-radius:2px;}
.guide{display:flex;align-items:center;gap:8px;background:#fff4ec;border:1.5px dashed #ff9d52;color:#a4500f;font-size:15px;font-weight:800;padding:11px 12px;border-radius:11px;margin-bottom:14px;line-height:1.35;}
.rdm .row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;}
.rdm .row .lb{font-size:17px;font-weight:700;}
.rdm .stp{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.rdm .stp .ctr{display:flex;align-items:center;gap:13px;}
.rdm .stp button{width:40px;height:40px;border-radius:10px;border:0;background:#f0f0f0;font-size:24px;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.rdm .stp button:disabled{color:#ccc;cursor:default;}
.rdm .stp button.tap{background:#ffe1cd;color:var(--orange);animation:btap 1.1s infinite;}
@keyframes btap{0%,100%{box-shadow:0 0 0 3px rgba(255,91,0,.9),0 0 0 5px rgba(255,91,0,.22);}50%{box-shadow:0 0 0 3px rgba(255,91,0,.9),0 0 0 12px rgba(255,91,0,0);}}
.rdm .stp .num{min-width:26px;text-align:center;font-size:22px;font-weight:800;}
.rdm .stp .bkn{font-size:13px;color:#aaa;}
.rdm .foot{padding:13px 16px 18px;}
.rdm .gobtn{width:100%;padding:16px;border:0;border-radius:12px;font-size:19px;font-weight:800;background:#eaeaea;color:#aaa;cursor:not-allowed;}
.rdm .gobtn.on{background:var(--orange);color:#fff;cursor:pointer;}
/* overlays */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:20;padding:22px;}
.modal{background:#fff;border-radius:18px;padding:24px 22px 18px;text-align:center;width:100%;max-width:290px;}
.modal p{font-size:17px;line-height:1.5;margin-bottom:20px;font-weight:600;}
.modal .yes{width:100%;padding:15px;border:0;border-radius:12px;background:var(--orange);color:#fff;font-size:18px;font-weight:800;cursor:pointer;margin-bottom:10px;}
.modal .no{width:100%;padding:15px;border:2px solid #ddd;border-radius:12px;background:#fff;color:#333;font-size:18px;font-weight:800;cursor:pointer;}
.toast{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:25;}
.toast .box{background:rgba(20,20,20,.88);color:#fff;border-radius:18px;padding:28px 36px;text-align:center;}
.toast .ck{width:56px;height:56px;border-radius:50%;border:4px solid #4ade80;color:#4ade80;font-size:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.toast .box span{font-size:19px;font-weight:700;}
/* done */
.donewrap{position:absolute;inset:0;background:#f4f4f4;}
.donewrap img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) brightness(.97) contrast(.96);}
.doneband{position:absolute;left:0;right:0;top:0;background:rgba(70,70,70,.94);color:#fff;font-size:16px;font-weight:800;text-align:center;padding:11px 6px;display:flex;align-items:center;justify-content:center;gap:7px;}
.cycle{margin:18px auto 0;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:16px;padding:18px;text-align:center;width:min(340px,92vw);font-size:16px;}
.cycle b{font-size:19px;}
.cbtns{display:flex;gap:11px;width:min(340px,92vw);margin:13px auto 0;}
.cbtns button{flex:1;padding:16px;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;border:2px solid var(--line);}
.cbtns .restart{background:var(--orange);color:#fff;border:0;}
.cbtns .home{background:#fff;color:#444;}
.cap{text-align:center;font-size:14px;color:#888;margin-top:11px;}
</style></head>
<body>
<div class="app">
  <div class="bar">
    <span class="lg">Klook 검표 연습</span>
    <div class="rt">
      <span class="chip" id="chip" style="display:none"></span>
      <button class="exit" id="exit" style="display:none" onclick="goHome()">✕ 메인</button>
    </div>
  </div>
  <div class="stage" id="stage"></div>
</div>

   <div class="lcards">
     <div class="lcard" onclick="pick('en')"><span class="fl">🇬🇧</span><div><b>English</b><span>영어</span></div><span class="ar">›</span></div>
     <div class="lcard" onclick="pick('zh')"><span class="fl">🇨🇳</span><div><b>中文</b><span>중국어</span></div><span class="ar">›</span></div>
     <div class="lcard" onclick="pick('ja')"><span class="fl">🇯🇵</span><div><b>日本語</b><span>일본어</span></div><span class="ar">›</span></div>
   </div>

   <div class="note"><div class="nt">⚠️ 꼭 기억하세요</div>
     <ul>
       <li><b>리딤은 취소할 수 없습니다.</b> 탑승 직전에만 처리하세요.</li>
       <li>성인·아동은 <b>함께</b> 리딤합니다.</li>
       <li>리딤은 <b>직원이 직접</b> 합니다.</li>
     </ul>
   </div>
  </div>`;
}
function progHTML(s){
  const steps=[['booking','예약확인'],['voucher','바우처'],['redeem','리딤'],['done','완료']];
  const idx=steps.findIndex(x=>x[0]===s);
  let h='<div class="prog">';
  steps.forEach((x,i)=>{ const cls=i<idx?'done':(i===idx?'on':''); h+=`<div class="p ${cls}"><b>${i<idx?'✓':i+1}</b>${x[1]}</div>`; if(i<steps.length-1)h+='<span class="sep"></span>'; });
  return h+'</div>';
}
function phoneHTML(d,s){
  if(s==='booking'){ const c=d.cta;
    return `<div class="phone"><div class="scr"><img src="${d.booking}">
      <div class="hot ring" style="left:${c.l}%;top:${c.t}%;width:${c.w}%;height:${c.h}%" onclick="render('voucher')"></div>
      <div class="taghint" style="left:${c.l}%;top:${c.t-6.5}%">👆 ${c.hint}</div>
    </div></div>`; }
  if(s==='voucher'){ const m=d.memo;
    return `<div class="phone"><div class="scr"><img src="${d.voucher}">
      <div class="hot ring" style="left:${m.l}%;top:${m.t}%;width:${m.w}%;height:${m.h}%" onclick="startRedeem()"></div>
      <div class="taghint" style="right:2%;top:${m.t+m.h+2}%">👆 ${m.hint}</div>
    </div></div>`; }
  if(s==='redeem'){ return `<div class="phone">${redeemHTML(d)}</div>`; }
  if(s==='done'){
    return `<div class="phone"><div class="donewrap"><img src="${d.done}">
       <div class="doneband">✓ 리딤 완료 · ${d.redeemed}</div></div></div>
     <div class="cycle"><b>🎉 ${d.name} 완료!</b><br>화면이 회색으로 변하며 리딤이 끝났습니다.</div>
     <div class="cbtns"><button class="restart" onclick="pick('${cur}')">🔄 다시 하기</button><button class="home" onclick="goHome()">🌐 다른 언어</button></div>`;
  }
}
function startRedeem(){ qty=[0,0]; render('redeem'); }
function redeemHTML(d){
  const r=d.rows;
  return `<div class="rdm">
    <div class="top"><span class="bk">‹</span>${d.title}</div>
    <div class="bd">
      <div class="ntc"><span class="i">i</span><div>${d.notice}</div></div>
      <div class="yel">${d.warn}</div>
      <div class="hd">${d.heading}</div>
      <div class="guide">👆 ＋ 로 탑승 인원을 선택하세요</div>
      ${r.map((row,i)=>`<div class="row"><div class="lb">${row[0]}</div>
        <div class="stp"><div class="ctr">
          <button id="m${i}" onclick="step(${i},-1)">−</button>
          <span class="num" id="n${i}">0</span>
          <button id="p${i}" class="tap" onclick="step(${i},1)">+</button>
        </div><div class="bkn">${row[1]}</div></div></div>`).join('')}
    </div>
    <div class="foot"><button class="gobtn" id="go" onclick="doRedeem()">${d.btn}</button></div>
  </div>`;
}
function step(i,v){ qty[i]=Math.max(0,Math.min(1,qty[i]+v)); syncRedeem(); }
function syncRedeem(){
  for(let i=0;i<2;i++){ const n=document.getElementById('n'+i); if(n)n.textContent=qty[i];
    const m=document.getElementById('m'+i), p=document.getElementById('p'+i);
    if(m)m.disabled=qty[i]<=0;
    if(p){ p.disabled=qty[i]>=1; p.classList.toggle('tap', qty[i]<1); } }
  const go=document.getElementById('go'); const tot=qty[0]+qty[1];
  if(go) go.className='gobtn'+(tot>0?' on':'');
}
function doRedeem(){
  const tot=qty[0]+qty[1]; if(tot<=0) return; const d=LANG[cur];
  const ph=document.querySelector('.phone');
  const ov=document.createElement('div'); ov.className='ov';
  ov.innerHTML=`<div class="modal"><p>${d.confirm.replace('{n}',tot)}</p>
    <button class="yes" onclick="confirmRedeem()">${d.yes}</button>
    <button class="no" onclick="this.closest('.ov').remove()">${d.no}</button></div>`;
  ph.appendChild(ov);
}
function confirmRedeem(){
  const d=LANG[cur]; const ph=document.querySelector('.phone');
  ph.querySelectorAll('.ov').forEach(e=>e.remove());
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<div class="box"><div class="ck">✓</div><span>${d.submitted}</span></div>`;
  ph.appendChild(t);
  setTimeout(()=>render('done'),1400);
}
render();
</script>
</body></html>
